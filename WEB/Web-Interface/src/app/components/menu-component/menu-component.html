@if (currentPage==="menu") {
    <button class="bg-orange-800 hover:cursor-pointer" (click)="logout()">Log out</button>
    <table>
        <tr>
            <td>
                <div class="menuBtn" (click)="navigateTo('inventory')">
                    <p>Manage inventory</p>
                    <img/>
                </div>
            </td>
            <td id="spacer"></td>
            <td>
                <div class="menuBtn" (click)="navigateTo('staff')">
                    <p>Manage staff</p>
                    <img/>
                </div>
            </td>
            <td id="spacer"></td>
            <td>
                <div class="menuBtn" (click)="navigateTo('sales')">
                    <p>Manage sales</p>
                    <img/>
                </div>
            </td>
        </tr>
    </table>
}
@else if (currentPage==="inventory") {
    <table class="block align-top">
        <tr class="align-top">
            <td class=""><app-sidebar-component (backToMenu)="navigateTo($event)"></app-sidebar-component></td>
            <td class=""><app-inventory-component></app-inventory-component></td>
        </tr>
    </table>

}
@else if (currentPage==="staff") {
    <table class="block align-top">
        <tr class="align-top">
            <td class=""><app-sidebar-component (backToMenu)="navigateTo($event)"></app-sidebar-component></td>
            <td class=""><app-staff-component></app-staff-component></td>
        </tr>
    </table>
}
@else if (currentPage==="sales") {
    <table class="block align-top">
        <tr class="align-top">
            <td><app-sidebar-component (backToMenu)="navigateTo($event)"></app-sidebar-component></td>
            <td><app-sales-component></app-sales-component></td>
        </tr>
    </table>
}
