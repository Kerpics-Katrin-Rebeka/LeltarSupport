<section class="m-5 max-w-3xl rounded-xl border border-slate-200 bg-gray-200 p-3 shadow-sm">

	<form class="grid grid-cols-1 gap-4 md:grid-cols-2" autocomplete="on" (ngSubmit)="placeRestockOrder()">
            <div class="md:col-span-1">
			<label for="employeeRole" class="mb-1 block text-sm font-medium text-slate-700">Ingredient</label>
                <select id="employeeRole" name="employeeRole" required [(ngModel)]="ingredientName" class="w-full rounded-md border border-slate-300 px-3 bg-gray-50 py-2 outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-200">
                    @for (ing of ingredients; track $index) {
                        <option value="{{ing.name}}">{{ing.ingredient.name|titlecase}}</option>
                    }
                </select>
		    </div>
		    <div class="md:col-span-1">
                <label for="employeePwd" class="mb-1 block text-sm font-medium  text-slate-700">Quantity</label>
                <input id="employeePwd" name="employeePwd" type="number" required [(ngModel)]="quantity" class="w-full rounded-md border border-slate-300 bg-gray-50 px-3 py-2 outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-200" />
            </div>
            <button class="bg-radial from-gray-600 size-8 text-center text-white rounded-xl" (click)="numberOfIngredients+=1">+</button>

		<div class="mt-2 flex items-center gap-3 md:col-span-2">
			<button type="submit" class="rounded-md bg-blue-600 px-4 py-2 font-semibold text-white transition hover:bg-blue-700">
				Place order
			</button>
			<button type="button" (click)="cancel()" class="rounded-md border border-slate-300 bg-white px-4 py-2 font-semibold text-slate-700 transition hover:bg-slate-50">
				Cancel
			</button>
		</div>
	</form>
</section>
