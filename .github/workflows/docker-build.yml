name: Build and Push to GHCR

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build backend image
        run: docker build -f ./karton-backend/backend.Dockerfile -t ghcr.io/holbok-peti/laravel:latest ./karton-backend

      - name: Push backend image
        run: docker push ghcr.io/holbok-peti/laravel:latest

      - name: Build frontend image
        run: docker build -f ./WEB/Web-Interface/frontend.Dockerfile -t ghcr.io/holbok-peti/angular:latest ./WEB/Web-Interface

      - name: Push frontend image
        run: docker push ghcr.io/holbok-peti/angular:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Deploy to jcloud.jedlik
        run: kubectl apply -f kubectl.yaml

      - name: Restart deployments to pull latest images
        run: |
          kubectl rollout restart deployment/laravel-backend
          kubectl rollout restart deployment/angular-frontend

      - name: Wait for rollouts
        run: |
          kubectl rollout status deployment/laravel-backend
          kubectl rollout status deployment/angular-frontend